name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run (no release, just preview)'
        required: false
        default: false
        type: boolean
      upload_to_play_store:
        description: 'Upload to Google Play Store'
        required: false
        default: false
        type: boolean
      play_store_track:
        description: 'Play Store release track'
        required: false
        type: choice
        default: 'internal'
        options:
          - internal    # Internal testing track (recommended for initial testing)
          - alpha       # Closed testing track
          - beta        # Open testing track
          - production  # Production release
      play_store_status:
        description: 'Play Store release status'
        required: false
        type: choice
        default: 'draft'
        options:
          - draft       # Create as draft, manual review needed
          - completed   # Complete the release immediately

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for changelog
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(grep "versionName = " app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          CURRENT_CODE=$(grep "versionCode = " app/build.gradle.kts | sed 's/[^0-9]*//g')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "code=$CURRENT_CODE" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION (code: $CURRENT_CODE)"
      
      - name: Parse release version
        id: next_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag-based release: use the tag name
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            CODE="${{ steps.current_version.outputs.code }}"
          else
            # Manual trigger: use version from build.gradle.kts
            VERSION="${{ steps.current_version.outputs.version }}"
            CODE="${{ steps.current_version.outputs.code }}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION (code: $CODE)"
      
      - name: Check if tag already exists
        if: ${{ !inputs.dry_run }}
        run: |
          TAG_NAME="v${{ steps.next_version.outputs.version }}"
          
          # Check if tag exists locally
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "❌ Tag $TAG_NAME already exists locally"
            exit 1
          fi
          
          # Check if tag exists on remote
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "❌ Tag $TAG_NAME already exists on remote"
            exit 1
          fi
          
          echo "✅ Tag $TAG_NAME is available"
      
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          NEXT_VERSION="${{ steps.next_version.outputs.version }}"
          
          echo "# Release v$NEXT_VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          if [ -n "$LAST_TAG" ]; then
            echo "## Changes since $LAST_TAG" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            
            # Get commit messages and format them
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" >> RELEASE_NOTES.md
          else
            echo "## Initial Release" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "First release of Cashiro" >> RELEASE_NOTES.md
          fi
          
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "Download the APK below and install it on your Android device." >> RELEASE_NOTES.md
          
          # Output for summary
          cat RELEASE_NOTES.md
      
      - name: Verify version alignment
        run: |
          echo "Using version: ${{ steps.next_version.outputs.version }} (code: ${{ steps.next_version.outputs.code }})"
          grep "version" app/build.gradle.kts
      
      - name: Validate Secrets
        run: |
          MISSING_SECRETS=""
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then MISSING_SECRETS="$MISSING_SECRETS KEYSTORE_BASE64"; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then MISSING_SECRETS="$MISSING_SECRETS KEYSTORE_PASSWORD"; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then MISSING_SECRETS="$MISSING_SECRETS KEY_ALIAS"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then MISSING_SECRETS="$MISSING_SECRETS KEY_PASSWORD"; fi
          
          if [ -n "$MISSING_SECRETS" ]; then
            echo "::error::Missing required secrets for signing:$MISSING_SECRETS"
            exit 1
          fi
          echo "✅ All signing secrets are present"

      - name: Decode Keystore
        if: ${{ !inputs.dry_run }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          if [ ! -s app/release.keystore ]; then
            echo "::error::Decoded keystore is empty"
            exit 1
          fi
          echo "✅ Release keystore created ($(stat -c%s app/release.keystore) bytes)"
      
      - name: Build Release APKs
        if: ${{ !inputs.dry_run }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx6G"
        run: |
          # Build standard flavor (for Play Store)
          echo "Building signed standard release APK..."
          ./gradlew assembleStandardRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          
          # Build F-Droid flavor
          echo "Building signed F-Droid release APK..."
          ./gradlew assembleFdroidRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
      
      - name: Rename APKs
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          STANDARD_PATH="app/build/outputs/apk/standard/release"
          FDROID_PATH="app/build/outputs/apk/fdroid/release"
          
          # Rename universal APK (contains all architectures)
          if [ -f "$STANDARD_PATH/app-standard-universal-release.apk" ]; then
            mv "$STANDARD_PATH/app-standard-universal-release.apk" \
               "$STANDARD_PATH/Cashiro-v${VERSION}-universal.apk"
          fi
          
          # Rename architecture-specific APKs
          for arch in armeabi-v7a arm64-v8a x86 x86_64; do
            if [ -f "$STANDARD_PATH/app-standard-${arch}-release.apk" ]; then
              mv "$STANDARD_PATH/app-standard-${arch}-release.apk" \
                 "$STANDARD_PATH/Cashiro-v${VERSION}-${arch}.apk"
            fi
          done
          
          # Rename F-Droid APKs
          # When ABI splits are disabled, Gradle outputs a single app-fdroid-release.apk (no -universal- suffix).
          # When splits are enabled it outputs app-fdroid-universal-release.apk, so handle both.
          if [ -f "$FDROID_PATH/app-fdroid-universal-release.apk" ]; then
            mv "$FDROID_PATH/app-fdroid-universal-release.apk" \
               "$FDROID_PATH/Cashiro-fdroid-v${VERSION}-universal.apk"
          elif [ -f "$FDROID_PATH/app-fdroid-release.apk" ]; then
            mv "$FDROID_PATH/app-fdroid-release.apk" \
               "$FDROID_PATH/Cashiro-fdroid-v${VERSION}-universal.apk"
          fi
          
          for arch in armeabi-v7a arm64-v8a; do
            if [ -f "$FDROID_PATH/app-fdroid-${arch}-release.apk" ]; then
              mv "$FDROID_PATH/app-fdroid-${arch}-release.apk" \
                 "$FDROID_PATH/Cashiro-fdroid-v${VERSION}-${arch}.apk"
            fi
          done
          
          echo "Standard APKs:"
          ls -la "$STANDARD_PATH/"
          echo "F-Droid APKs:"
          ls -la "$FDROID_PATH/"
      
      - name: Calculate SHA256
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          
          # SHA256 for all standard APKs
          cd app/build/outputs/apk/standard/release/
          for apk in Cashiro-v${VERSION}*.apk; do
            if [ -f "$apk" ]; then
              sha256sum "$apk" > "${apk}.sha256"
              echo "SHA256 for $apk:"
              cat "${apk}.sha256"
            fi
          done
          
          # SHA256 for all F-Droid APKs
          cd ../../fdroid/release/
          for apk in Cashiro-fdroid-v${VERSION}*.apk; do
            if [ -f "$apk" ]; then
              sha256sum "$apk" > "${apk}.sha256"
              echo "SHA256 for $apk:"
              cat "${apk}.sha256"
            fi
          done
      
      # Commit version bump and push removed - version should be pre-set in build.gradle.kts

      
      - name: Create and push tag
        if: ${{ !inputs.dry_run && github.event_name != 'push' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create new tag at current commit
          git tag -a "v${{ steps.next_version.outputs.version }}" -m "Release v${{ steps.next_version.outputs.version }}"
          
          # Push the tag
          git push origin "v${{ steps.next_version.outputs.version }}"
      
      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next_version.outputs.version }}
          name: Release v${{ steps.next_version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            app/build/outputs/apk/standard/release/Cashiro-v${{ steps.next_version.outputs.version }}-universal.apk
            app/build/outputs/apk/standard/release/Cashiro-v${{ steps.next_version.outputs.version }}-arm64-v8a.apk
            app/build/outputs/apk/standard/release/Cashiro-v${{ steps.next_version.outputs.version }}-armeabi-v7a.apk
            app/build/outputs/apk/fdroid/release/Cashiro-fdroid-v${{ steps.next_version.outputs.version }}-universal.apk
          draft: false
          prerelease: false
      
      - name: Dry Run Summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "🔍 DRY RUN SUMMARY"
          echo "=================="
          echo "Version: ${{ steps.next_version.outputs.version }}"
          echo "Version code: ${{ steps.next_version.outputs.code }}"
          echo ""
          echo "📝 Release Notes:"
          cat RELEASE_NOTES.md
      
      - name: Build App Bundle for Play Store
        if: ${{ !inputs.dry_run && inputs.upload_to_play_store }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Building signed App Bundle for Play Store..."
          ./gradlew bundleStandardRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          
          # Rename AAB file
          AAB_PATH="app/build/outputs/bundle/standardRelease"
          mv "$AAB_PATH/app-standard-release.aab" \
             "$AAB_PATH/Cashiro-v${{ steps.next_version.outputs.version }}.aab"
          echo "App Bundle created: $AAB_PATH/Cashiro-v${{ steps.next_version.outputs.version }}.aab"
      
      - name: Upload to Play Store
        if: ${{ !inputs.dry_run && inputs.upload_to_play_store }}
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.ritesh.cashiro
          releaseFiles: app/build/outputs/bundle/standardRelease/Cashiro-v${{ steps.next_version.outputs.version }}.aab
          track: ${{ inputs.play_store_track }}
          status: ${{ inputs.play_store_status }}
          releaseName: v${{ steps.next_version.outputs.version }}
          whatsNewDirectory: fastlane/metadata/android/en-US/changelogs/
          mappingFile: app/build/outputs/mapping/standardRelease/mapping.txt
      
      - name: Clean up keystore
        if: always()
        run: |
          rm -f app/release.keystore
          
